<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>jiung_k4影通</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #fdf0f8; font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif; color: #2a1a30; min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    body::before, body::after { content: ''; position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
    body::before { width: 280px; height: 280px; background: radial-gradient(circle, rgba(255, 182, 217, 0.35) 0%, transparent 70%); top: -80px; right: -60px; }
    body::after { width: 220px; height: 220px; background: radial-gradient(circle, rgba(180, 210, 255, 0.35) 0%, transparent 70%); bottom: 60px; left: -50px; }
    .bg-blob { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; width: 160px; height: 160px; background: radial-gradient(circle, rgba(255, 220, 130, 0.25) 0%, transparent 70%); bottom: 200px; right: -30px; }
    .header { background: #fff; padding: 18px 18px 16px; display: flex; align-items: center; gap: 10px; position: relative; z-index: 10; box-shadow: 0 4px 20px rgba(255, 150, 200, 0.12); border-bottom: 3px solid #ffe0f0; }
    .header-badge { background: linear-gradient(135deg, #ff8ec7 0%, #ff5fa0 100%); color: #fff; font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 20px; white-space: nowrap; box-shadow: 0 4px 12px rgba(255, 95, 160, 0.35); animation: bounce 1.8s ease-in-out infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-3px) rotate(1deg); } }
    .header-title { font-size: 16px; font-weight: 800; color: #d63f8a; line-height: 1.3; }
    .header::after { content: '✦'; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #ffb3d9; font-size: 18px; animation: spin 4s linear infinite; }
    @keyframes spin { from { transform: translateY(-50%) rotate(0deg); } to { transform: translateY(-50%) rotate(360deg); } }
    .notice-wrap { margin: 14px 14px; background: linear-gradient(135deg, #fff5fb 0%, #fff0f8 100%); border-radius: 20px; padding: 14px 16px; border: 2px dashed #ffb3d9; position: relative; z-index: 1; }
    .notice-text { font-size: 13px; color: #6a3050; line-height: 1.8; font-weight: 600; }
    .card { background: #fff; border-radius: 22px; margin: 12px 14px; padding: 20px 18px 16px; border: 2px solid #ffe0f0; box-shadow: 0 6px 24px rgba(255, 150, 200, 0.1), 0 2px 8px rgba(0,0,0,0.04); position: relative; z-index: 1; overflow: hidden; }
    .card-label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #7a3560; margin-bottom: 10px; font-weight: 700; }
    .card-label .icon { font-size: 18px; }
    .card-value { font-size: 34px; font-weight: 800; color: #e0529a; line-height: 1.2; margin-bottom: 4px; }
    .card-desc { font-size: 12px; color: #a06080; margin-top: 8px; font-weight: 600; }
    .card input[type="number"] { font-size: 34px; font-weight: 800; color: #e0529a; border: none; outline: none; background: transparent; width: 100%; padding: 2px 0; line-height: 1.2; }
    .card input[type="number"]::-webkit-inner-spin-button, .card input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .cut-card { background: linear-gradient(135deg, #fff0f8 0%, #ffe8f4 100%); }
    .cut-card .card-value { background: linear-gradient(135deg, #ff8ec7 0%, #d63f8a 100%); color: transparent; -webkit-background-clip: text; background-clip: text; border-radius: 16px; display: inline-block; padding: 8px 28px; font-size: 30px; border: 2.5px solid #ffb3d9; text-align: center; }
    .record-card { background: #fff; border-radius: 22px; margin: 12px 14px 28px; padding: 18px 16px 14px; border: 2px solid #ffe0f0; box-shadow: 0 6px 24px rgba(255, 150, 200, 0.1); position: relative; z-index: 1; }
    .record-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .record-title-wrap { display: flex; align-items: center; gap: 8px; }
    .record-title { font-size: 15px; font-weight: 800; color: #d63f8a; display: flex; align-items: center; gap: 5px; }
    .record-count { background: #ffe0f0; color: #c0306a; font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 700; }
    .record-update { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #66c98a; font-weight: 700; }
    .record-update .dot { width: 8px; height: 8px; background: #66c98a; border-radius: 50%; display: inline-block; animation: blink 1.8s ease-in-out infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .sort-toggle { display: flex; gap: 10px; margin-bottom: 14px; }
    .sort-btn { display: flex; align-items: center; gap: 7px; font-size: 13px; color: #7a5060; cursor: pointer; padding: 7px 14px; border-radius: 30px; border: 2px solid #eee; font-weight: 700; background: #fafafa; }
    .sort-btn .radio { width: 16px; height: 16px; border: 2px solid #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .sort-btn.active { background: linear-gradient(135deg, #ffe0f0 0%, #ffd0ea 100%); border-color: #ffb3d9; color: #d63f8a; }
    .sort-btn.active .radio { border-color: #ff8ec7; background: linear-gradient(135deg, #ff8ec7 0%, #d63f8a 100%); }
    .sort-btn.active .radio::after { content: ''; width: 7px; height: 7px; background: #fff; border-radius: 50%; }
    .record-table { width: 100%; border-collapse: separate; border-spacing: 0 4px; }
    .record-table th { font-size: 11px; color: #a06080; font-weight: 700; text-align: left; padding: 4px 8px 10px; }
    .record-table th:last-child, .record-table td:last-child { text-align: right; }
    .record-table tbody tr { background: #fff9fc; border-radius: 12px; }
    .record-table td { font-size: 13px; color: #2e1a2a; padding: 11px 8px; border-top: 1px solid #fff0f8; border-bottom: 1px solid #fff0f8; }
    .record-table td:first-child { border-left: 1px solid #fff0f8; border-radius: 12px 0 0 12px; }
    .record-table td:last-child { border-right: 1px solid #fff0f8; border-radius: 0 12px 12px 0; }
    .record-table .col-time { font-size: 11.5px; color: #7a5568; white-space: nowrap; font-weight: 600; }
    .record-table .col-source { color: #5a3a80; font-weight: 700; }
    .record-table .col-change { color: #4a3040; font-size: 12px; font-weight: 600; }
    .record-table .col-single { font-weight: 800; font-size: 14px; }
    .col-single.positive { color: #ff5fa0; } .col-single.zero { color: #b0b0d0; }
    .record-footer { text-align: center; font-size: 12px; color: #b07090; padding: 12px 0 4px; font-weight: 600; }
    .record-footer::before { content: '🌷 '; } .record-footer::after { content: ' 🌷'; }
    .card-row { display: flex; gap: 10px; margin: 12px 14px; position: relative; z-index: 1; }
    .card-row .card { flex: 1; margin: 0; min-width: 0; padding: 14px 12px 12px; }
    .card-row .card-label { font-size: 11px; margin-bottom: 8px; white-space: nowrap; }
    .card-row .card-value, .card-row input[type="number"] { font-size: 22px; }
    .card-row .cut-card .card-value { font-size: 20px; padding: 6px 10px; width: 100%; }
    .card-row .card-desc { font-size: 10px; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="bg-blob"></div>
  <div class="header">
    <span class="header-badge">🔥 限时</span>
    <span class="header-title">jiung影通 监控中</span>
  </div>
  <div class="notice-wrap">
    <p class="notice-text">
      最后5-10分钟请监控销量变化补单，推荐本数根据数据来源内的所有数据计算，为中签中位数本数，仅作参考，不提供擦线本数；若名额人数有问题、数据长时间没更新，请及时联系我们（vx：kuuritt）。
    </p>
  </div>
  <div class="card-row">
    <div class="card card-sm">
      <div class="card-label"><span class="icon">💧</span>注水阈值</div>
      <input type="number" id="threshold" value="0" placeholder="0" oninput="recalculate()" />
      <div class="card-desc">用于计算 cut</div>
    </div>
    <div class="card card-sm cut-card">
      <div class="card-label"><span class="icon">📐</span>推荐 CUT</div>
      <span class="card-value" id="recommended-cut">—</span>
      <div class="card-desc">仅供参考</div>
    </div>
    <div class="card card-sm">
      <div class="card-label"><span class="icon">👥</span>名额人数</div>
      <input type="number" id="slots" value="30" placeholder="30" oninput="recalculate()" />
      <div class="card-desc">总名额人数</div>
    </div>
  </div>
  <div class="card">
    <div class="card-label"><span class="icon">📊</span>总销量</div>
    <div class="card-value" id="total-sales">0</div>
    <div class="card-desc">本场活动的总销售量</div>
  </div>
  <div class="record-card" id="record-section" style="display:none;">
    <div class="record-header">
      <div class="record-title-wrap">
        <span class="record-title"><span class="emoji">🌸</span>销量变化实时记录</span>
        <span class="record-count" id="record-count">0 条</span>
      </div>
      <div class="record-update">
        <span class="dot"></span>
        <span id="update-time">—</span>
      </div>
    </div>
    <div class="sort-toggle">
      <div class="sort-btn active" id="btn-time" onclick="setSortMode('time')"><span class="radio"></span>时间顺序</div>
      <div class="sort-btn" id="btn-sales" onclick="setSortMode('sales')"><span class="radio"></span>销量降序</div>
    </div>
    <table class="record-table">
      <thead>
        <tr><th>时间</th><th>来源</th><th>变化</th><th>单笔</th></tr>
      </thead>
      <tbody id="record-tbody"></tbody>
    </table>
    <div class="record-footer">每15秒自动拉取最新数据</div>
  </div>

  <script>
    var rawData = [];
    var sortMode = 'time';

    document.addEventListener('DOMContentLoaded', function () {
      loadData();
      setInterval(loadData, 15000); // 每15秒自动更新
    });

    function loadData() {
      fetch('JIUNG_VDC.csv?t=' + new Date().getTime())
        .then(function (res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.arrayBuffer();
        })
        .then(function (buf) { parseCSV(buf); })
        .catch(function (e) { console.error("读取失败", e); });
    }

    function parseCSV(buf) {
      var wb = XLSX.read(buf, { type: 'array' });
      var ws = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

      rawData = [];
      for (var i = 0; i < rows.length; i++) {
        var row = rows[i];
        if (row.length < 4 || row.every(function (c) { return String(c).trim() === ''; })) continue;

        // 直接按无表头处理：第0列时间，第1列渠道，第2列变化，第3列单笔
        var singleVal = parseFloat(String(row[3]).replace(/,/g, '')) || 0;
        rawData.push({
          time:       String(row[0] || '').trim(),
          source:     String(row[1] || '').trim(),
          changeText: String(row[2] || '').trim(),
          single:     Math.abs(singleVal)
        });
      }
      processData();
    }

    function processData() {
      if (rawData.length === 0) return;
      var totalSales = rawData.reduce(function (s, r) { return s + r.single; }, 0);
      document.getElementById('total-sales').textContent = totalSales;

      var now = new Date();
      var hms = [now.getHours(), now.getMinutes(), now.getSeconds()]
        .map(function (v) { return String(v).padStart(2, '0'); }).join(':');
      document.getElementById('update-time').textContent = '更新于 ' + hms;
      document.getElementById('record-count').textContent = rawData.length + ' 条';
      document.getElementById('record-section').style.display = 'block';

      window._records = rawData;
      recalculate();
      renderTable();
    }

    function renderTable() {
      var records = (window._records || []).slice();
      if (sortMode === 'sales') records.sort(function (a, b) { return b.single - a.single; });
      var tbody = document.getElementById('record-tbody');
      tbody.innerHTML = '';
      records.forEach(function (r) {
        var singleClass = 'col-single ' + (r.single === 0 ? 'zero' : 'positive');
        var singleText  = r.single === 0 ? '0' : '+' + r.single;
        var tr = document.createElement('tr');
        tr.innerHTML = '<td class="col-time">' + r.time + '</td><td class="col-source">' + r.source + '</td><td class="col-change">' + r.changeText + '</td><td class="' + singleClass + '">' + singleText + '</td>';
        tbody.appendChild(tr);
      });
    }

    function recalculate() {
      var threshold = parseInt(document.getElementById('threshold').value) || 0;
      var slots     = parseInt(document.getElementById('slots').value)     || 0;
      var records   = window._records || [];
      if (records.length === 0 || slots <= 0) {
        document.getElementById('recommended-cut').textContent = '—';
        return;
      }
      var base  = records.filter(function (r) { return r.single > 0; });
      var valid = threshold > 0 ? base.filter(function (r) { return r.single <= threshold; }) : base;
      if (valid.length === 0) {
        document.getElementById('recommended-cut').textContent = '—';
        return;
      }
      var validTotal = valid.reduce(function (s, r) { return s + r.single; }, 0);
      document.getElementById('recommended-cut').textContent = Math.ceil(validTotal / slots);
    }

    function setSortMode(mode) {
      sortMode = mode;
      document.getElementById('btn-time').classList.toggle('active', mode === 'time');
      document.getElementById('btn-sales').classList.toggle('active', mode === 'sales');
      renderTable();
    }
  </script>
</body>
</html>
